  <!-- TikTok Funnel Events (ViewContent + ClickButton) -->
  <script>
  (function(){
    if (typeof ttq === 'undefined') return;
    var p = window.location.pathname;
    function getCat() {
      if (p === '/' || p === '/index.html' || p.endsWith('/index.html') && p.split('/').length === 2) return 'Homepage';
      if (p.indexOf('/ar/blog') > -1) return 'Blog AR';
      if (p.indexOf('/ar/') === 0 || p === '/ar' || p === '/ar/') return 'Homepage AR';
      if (p.indexOf('choose-number') > -1) return 'Number Browsing';
      if (p.indexOf('emirati') > -1) return 'Emirati Plan';
      if (p.indexOf('dubai') > -1) return 'Dubai Plans';
      if (p.indexOf('abu-dhabi') > -1) return 'Abu Dhabi Plans';
      if (p.indexOf('sharjah') > -1) return 'Sharjah Plans';
      if (p.indexOf('/blog') > -1) return 'Blog';
      if (p.indexOf('thank-you') > -1) return 'Thank You';
      if (p.indexOf('privacy') > -1) return 'Privacy';
      if (p.indexOf('404') > -1) return '404';
      return 'Other';
    }
    var cat = getCat();
    var title = (document.title || 'Golden Numbers').substring(0, 100);
    try {
      ttq.track('ViewContent', {
        content_name: title,
        content_category: cat,
        content_type: 'product_group',
        content_id: p
      });
    } catch(e){}
    document.addEventListener('click', function(e){
      try {
        var el = e.target.closest('.nav-cta, .btn-primary, .hero-cta, .btn-outline, [data-tt-cta]');
        if (!el) return;
        if (el.classList.contains('btn-wa')) return;
        var label = (el.textContent || '').trim().substring(0, 80);
        var href = el.getAttribute('href') || '';
        ttq.track('ClickButton', {
          content_name: label,
          content_category: cat,
          content_id: href
        });
      } catch(err){}
    }, true);
  })();
  </script>
  <!-- End TikTok Funnel Events -->

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #FFFFFF;
      --surface: #F8F8F8;
      --surface-border: #E5E5E5;
      --gold: #ED1C24;
      --gold-light: #FF4444;
      --text: #1A1A1A;
      --text-muted: rgba(26, 26, 26, 0.65);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 560px;
    }
    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: scaleIn 0.5s ease;
    }
    .checkmark svg {
      width: 40px;
      height: 40px;
      stroke: var(--bg);
      stroke-width: 3;
      fill: none;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .highlight {
      color: var(--gold);
      font-weight: 600;
    }
    .cta-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.8rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--bg);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,169,98,0.3); }
    .btn-outline {
      border: 1.5px solid var(--surface-border);
      color: var(--text);
      background: var(--surface);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 2rem auto;
    }
    .footer-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.6;
    }
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
